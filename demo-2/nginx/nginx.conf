events {}

http {
    # Map: writes require X-Auth-Token = WRITE_TOKEN. Reads are anonymous.
    # $request_method is GET/POST/etc. Build a key and check it.
    map "$request_method:$http_x_auth_token" $write_ok {
        default                                 0;
        "~^(GET|HEAD|OPTIONS):"                 1;        # any read = ok
        "~^(POST|PUT|PATCH|DELETE):${WRITE_TOKEN}$" 1;    # write + correct token = ok
    }

    # Registry API on x8080
    server {
        listen 8080;
        server_name _;

        if ($write_ok = 0) {
            return 403 "read-only: writes require X-Auth-Token header\n";
        }

        location /apis/ {
            proxy_pass http://apicurio-registry:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            return 404 "registry port: use /apis/ or open UI on :28888\n";
        }
    }

    # UI on x8888 (also proxies /apis/ so browser UI works self-contained)
    server {
        listen 8888;
        server_name _;

        if ($write_ok = 0) {
            return 403 "read-only: writes require X-Auth-Token header\n";
        }

        location /apis/ {
            proxy_pass http://apicurio-registry:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://apicurio-ui:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
