services:
  apicurio-registry:
    image: apicurio/apicurio-registry:3.0.6
    container_name: demo3-apicurio-registry
    environment:
      QUARKUS_HTTP_CORS_ORIGINS: "*"
      APICURIO_STORAGE_KIND: "sql"
      APICURIO_STORAGE_SQL_KIND: "postgresql"
      APICURIO_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/apicurio"
      APICURIO_DATASOURCE_USERNAME: "apicurio"
      APICURIO_DATASOURCE_PASSWORD: "apicurio"
    networks:
      - demo-3
    depends_on:
      postgres:
        condition: service_healthy

  apicurio-init:
    image: alpine:3.19
    container_name: demo3-apicurio-init
    depends_on:
      - apicurio-registry
    volumes:
      - ./schemas:/schemas:ro
      - ./scripts:/scripts:ro
    environment:
      REGISTRY_URL: "http://apicurio-registry:8080"
      GROUP_ID: "demo"
      COMPAT_LEVEL: "BACKWARD"
    entrypoint: ["/bin/sh", "-c"]
    command: ["apk add --no-cache bash curl jq >/dev/null && /scripts/init.sh"]
    restart: "no"
    networks:
      - demo-3

  apicurio-ui:
    image: apicurio/apicurio-registry-ui:3.0.6
    container_name: demo3-apicurio-ui
    environment:
      REGISTRY_API_URL: "/apis/registry/v3"
    networks:
      - demo-3
    depends_on:
      - apicurio-registry

  nginx:
    image: nginx:1.27-alpine
    container_name: demo3-nginx
    ports:
      - "38080:8080"
      - "38888:8888"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    environment:
      WRITE_TOKEN: "${WRITE_TOKEN:-changeme}"
    command: >
      /bin/sh -c "envsubst '$$WRITE_TOKEN' < /etc/nginx/nginx.conf > /tmp/nginx.conf
      && exec nginx -c /tmp/nginx.conf -g 'daemon off;'"
    networks:
      - demo-3
    depends_on:
      - apicurio-registry
      - apicurio-ui

  postgres:
    image: postgres:16-alpine
    container_name: demo3-apicurio-postgres
    environment:
      POSTGRES_DB: apicurio
      POSTGRES_USER: apicurio
      POSTGRES_PASSWORD: apicurio
    volumes:
      - apicurio-pg-data:/var/lib/postgresql/data
    networks:
      - demo-3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apicurio -d apicurio"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  apicurio-pg-data:

networks:
  demo-3:
    name: demo-3
    driver: bridge
