services:
  apicurio-registry:
    image: apicurio/apicurio-registry:3.0.6
    container_name: apicurio-registry
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      QUARKUS_HTTP_CORS_ORIGINS: "*"
      APICURIO_STORAGE_KIND: "sql"
      APICURIO_STORAGE_SQL_KIND: "postgresql"
      APICURIO_DATASOURCE_URL: "jdbc:postgresql://apicurio-postgres:5432/apicurio"
      APICURIO_DATASOURCE_USERNAME: "apicurio"
      APICURIO_DATASOURCE_PASSWORD: "apicurio"
    depends_on:
      apicurio-postgres:
        condition: service_healthy
    networks:
      - apicurio-net

  apicurio-postgres:
    image: postgres:16-alpine
    container_name: apicurio-postgres
    environment:
      POSTGRES_DB: apicurio
      POSTGRES_USER: apicurio
      POSTGRES_PASSWORD: apicurio
    tmpfs:
      - /var/lib/postgresql/data
    networks:
      - apicurio-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apicurio -d apicurio"]
      interval: 5s
      timeout: 5s
      retries: 10

  apicurio-seed:
    image: alpine:3.19
    container_name: apicurio-seed
    depends_on:
      - apicurio-registry
    volumes:
      - ./data-schemas/schemas:/schemas:ro
      - ./init:/init:ro
    environment:
      REGISTRY_URL: "http://apicurio-registry:8080"
    entrypoint: ["/bin/sh", "-c"]
    command:
      ["apk add --no-cache bash curl jq >/dev/null && /init/seed-apicurio.sh"]
    restart: "no"
    networks:
      - apicurio-net

  apicurio-readonly-proxy:
    image: nginx:alpine
    container_name: apicurio-readonly-proxy
    depends_on:
      - apicurio-registry
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - apicurio-net

  apicurio-registry-ui:
    image: apicurio/apicurio-registry-ui:3.0.6
    container_name: apicurio-registry-ui
    depends_on:
      - apicurio-readonly-proxy
    ports:
      - "8888:8080"
    volumes:
      - ./apicurio-ui-config.js:/opt/app-root/src/config.js:ro
    networks:
      - apicurio-net

  kafka:
    image: apache/kafka:3.7.1
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: apicurio-zod-kafka-cluster-01
      KAFKA_HEAP_OPTS: "-Xms128M -Xmx256M"
    ports:
      - "19092:19092"
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - apicurio-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - apicurio-net

  data-service-api:
    build: ./data-service-api
    container_name: data-service-api
    depends_on:
      - apicurio-registry
      - kafka
    ports:
      - "3000:3000"
    environment:
      REGISTRY_URL: http://apicurio-registry:8080
      PORT: 3000
      KAFKA_BROKERS: kafka:9092
    command: ["npx", "tsx", "src/server.ts"]
    networks:
      - apicurio-net

  event-ui:
    build: ./event-ui
    container_name: event-ui
    depends_on:
      - data-service-api
    ports:
      - "4000:80"
    networks:
      - apicurio-net

volumes:
  kafka-data:

networks:
  apicurio-net:
    driver: bridge
