events {}

http {
    # Registry API on x8080
    server {
        listen 8080;
        server_name _;

        location /apis/ {
            proxy_pass http://apicurio-registry:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            return 404 "registry port: use /apis/ or open UI on :18888\n";
        }
    }

    # UI on x8888 (also proxies /apis/ so browser UI works self-contained)
    server {
        listen 8888;
        server_name _;

        location /apis/ {
            proxy_pass http://apicurio-registry:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://apicurio-ui:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
